services:
  - type: web
    name: kreator-cv
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # wpisz ręcznie w Render dashboard
      - key: OPENAI_MODEL_PRIMARY
        value: gpt-4.1
      - key: OPENAI_MODEL_FALLBACK
        value: gpt-4.1-mini
      - key: OPENAI_MODEL_MINI
        value: gpt-4.1-mini
      - key: SMTP_HOST
        value: mail.tomaszuscinski.pl
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: tomasz@tomaszuscinski.pl
      - key: SMTP_PASSWORD
        sync: false          # wpisz ręcznie w Render dashboard
      - key: SMTP_FROM
        value: tomasz@tomaszuscinski.pl
      - key: SMTP_FROM_NAME
        value: "Tomasz Uściński"
      - key: APP_USERNAME
        sync: false          # login do Basic Auth (np. anna)
      - key: APP_PASSWORD
        sync: false          # hasło do Basic Auth
      - key: RESEND_API_KEY
        sync: false
      - key: DB_ENABLED
        value: "true"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: FTP_ENABLED
        value: "true"
      - key: FTP_HOST
        sync: false
      - key: FTP_PORT
        value: "21"
      - key: FTP_USER
        sync: false
      - key: FTP_PASSWORD
        sync: false
      - key: FTP_BASE_DIR
        sync: false
